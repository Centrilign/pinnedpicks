<html lang="en" data-theme="light">
<head>
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':

      j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
      'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
      })(window,document,'script','dataLayer','GTM-K8SG3X4S');</script>
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Saved Pins</title>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "https://www.pinnedpicks.gt.tc/"
      },
      {
        "@type": "ListItem",
        "position": 2,

        "item": "https://www.pinnedpicks.gt.tc/saved.html"
      }
    ]

  </script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/png" href="webimages/favicon.png" />

  <style>

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #faf8f5;
      --bg2: #f2ede6;
      --card: #ffffff;
      --text: #1a1612;
      --muted: #7a6f65;
      --accent: #c8521a;
      --accent2: #e8855a;
      --border: rgba(0,0,0,0.09);
      --shadow: 0 2px 24px rgba(0,0,0,0.07);
    }

    [data-theme="dark"] {
      --bg: #130f0b;
      --bg2: #1d1710;
      --card: #1f1a14;
      --text: #f0ebe3;
      --muted: #9a8e82;
      --accent: #e06b30;
      --accent2: #f09060;
      --border: rgba(255,255,255,0.07);
      --shadow: 0 2px 24px rgba(0,0,0,0.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      transition: background 0.35s, color 0.35s;
    }

    html {
      scroll-behavior: smooth;
    }

    * {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    *::-webkit-scrollbar {
      display: none;
    }

    /* HEADER */

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0;
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent);
      text-decoration: none;
    }

    .logo span {
      color: var(--text);
    }

    .logo-img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .theme-btn {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--muted);
      cursor: pointer;
      transition: 0.2s;
    }

    .theme-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .nav-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    }

    .browse-nav-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 36px;
    padding: 0 14px;
    border-radius: 999px;
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    white-space: nowrap;

    color: var(--text);
    background: var(--bg2);
    border: 1px solid var(--border);

    transition:
        background-color 0.2s ease,
        border-color 0.2s ease,
        color 0.2s ease,
        transform 0.18s ease;
    }

    .browse-nav-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
    }

    .browse-nav-btn:active {
    transform: translateY(0);
    }

    .browse-nav-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    }

    /* HERO */

    .saved-hero {
      padding: 70px 24px 42px;
      text-align: center;
    }

    .saved-hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 10px;
    }

    .saved-hero p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* GRID */

    .saved-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    #savedPinsGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 22px;
      align-items: start;
    }

    /* CARD */

    .card {
      background: var(--card);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition:
        transform 0.22s ease,
        border-color 0.22s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      display: block;
      background: var(--bg2);
    }

    .card-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .meta-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .meta-tag {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--bg2);
      color: var(--muted);
    }

    .card h3 {
      font-size: 0.94rem;
      line-height: 1.5;
      font-weight: 600;
    }

    .card-footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card-cta {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent);
    }

    .save-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 999px;
      color: inherit;
      opacity: 1;
      transition:
        opacity 0.2s ease,
        transform 0.18s ease;
    }

    .save-btn:hover {
      transform: scale(1.06);
    }

    .save-btn svg {
      width: 19px;
      height: 19px;
      fill: currentColor;
    }

    /* EMPTY */

    .empty-state {
      min-height: 55vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .empty-state h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      margin-bottom: 12px;
    }

    .empty-state p {
      color: var(--muted);
      margin-bottom: 24px;
      max-width: 420px;
      line-height: 1.7;
    }

    .browse-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 22px;
      border-radius: 999px;
      text-decoration: none;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      transition: transform 0.2s ease;
    }

    .browse-btn:hover {
      transform: translateY(-2px);
    }

    /* MOBILE */

    html { overflow-x: hidden; }
    body { overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    body.nav-open { overflow: hidden; position: fixed; width: 100%; }
    a, button { -webkit-tap-highlight-color: transparent; }
    header { padding: 12px 40px; }

    .sub-page-nav { display: flex; align-items: center; gap: 4px; }
    .sub-page-nav-link { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 999px; text-decoration: none; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.02em; color: var(--muted); background: transparent; border: 1px solid transparent; transition: color 0.2s, border-color 0.2s, background 0.2s; }
    .sub-page-nav-link:hover { color: var(--accent); border-color: var(--border); background: var(--bg2); }

    .browse-nav-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      border: none;
      transition: color 0.2s ease, transform 0.18s ease;
      white-space: nowrap;
    }

    .browse-nav-btn:hover { color: var(--accent); transform: translateY(-1px); }

    .theme-btn { background: transparent; border: none; transition: color 0.2s, transform 0.18s; }
    .theme-btn:hover { color: var(--accent); transform: scale(1.15); }

    .sub-mobile-btn { display: none; flex-direction: column; justify-content: center; gap: 5px; width: 36px; height: 36px; background: transparent; border: none; cursor: pointer; padding: 4px; border-radius: 6px; transition: background 0.2s; }
    .sub-mobile-btn:hover { background: var(--bg2); }
    .sub-mobile-btn span { display: block; width: 22px; height: 1.5px; background: var(--muted); border-radius: 2px; transition: background 0.2s; }
    .sub-mobile-btn:hover span { background: var(--accent); }

    .sub-nav-drawer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 99999; pointer-events: none; visibility: hidden; transition: visibility 0s linear 0.35s; }
    .sub-nav-drawer.open { pointer-events: all; visibility: visible; transition: visibility 0s linear 0s; }
    .sub-nav-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); opacity: 0; transition: opacity 0.3s ease; }
    .sub-nav-drawer.open .sub-nav-overlay { opacity: 1; }
    .sub-nav-panel { position: fixed; top: 0; right: 0; width: 260px; max-width: 82vw; height: 100vh; background: var(--card); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -8px 0 48px rgba(0,0,0,0.18); will-change: transform; z-index: 1; }
    .sub-nav-drawer.open .sub-nav-panel { transform: translateX(0); }
    .sub-nav-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .sub-nav-title { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--text); }
    .sub-nav-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; cursor: pointer; color: var(--muted); font-size: 1.3rem; border-radius: 50%; transition: background 0.2s, color 0.2s; }
    .sub-nav-close:hover { background: var(--bg2); color: var(--accent); }
    .sub-nav-links { display: flex; flex-direction: column; padding: 12px 0; flex: 1; }
    .sub-nav-link { display: flex; align-items: center; gap: 12px; padding: 14px 20px; text-decoration: none; font-size: 0.9rem; font-weight: 600; color: var(--text); border-bottom: 1px solid var(--border); transition: background 0.18s, color 0.18s; }
    .sub-nav-link:last-child { border-bottom: none; }
    .sub-nav-link:hover { background: var(--bg2); color: var(--accent); }
    .sub-nav-link svg { flex-shrink: 0; opacity: 0.7; }

    @media (max-width: 768px) { .sub-page-nav { display: none; } .sub-mobile-btn { display: flex; } }
    @media (min-width: 769px) { .sub-mobile-btn { display: none !important; } .sub-nav-drawer { visibility: hidden !important; pointer-events: none !important; } }

    @media (max-width: 640px) {
      header { padding: 12px 18px; }
      .logo { font-size: 1.25rem; }
      .logo-img { width: 34px; height: 34px; }
      .saved-wrap { padding: 0 16px 60px; }
      #savedPinsGrid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .card-body { padding: 14px; }
      .nav-actions { gap: 8px; }
      .browse-nav-btn { height: 34px; padding: 0 12px; font-size: 0.76rem; }
    }

  </style>
</head>

<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K8SG3X4S"
      height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <header>
    <a href="index.html" class="logo">
      <img src="webimages/favicon.png" alt="PinnedPicks Logo" class="logo-img" />
      Pinned<span>Picks</span>
    </a>
    <nav class="sub-page-nav" aria-label="Site navigation">
      <a class="sub-page-nav-link" href="index.html">Home</a>
      <a class="sub-page-nav-link" href="about.html">About</a>
      <a class="sub-page-nav-link" href="privacypolicy.html">Privacy</a>
      <a class="sub-page-nav-link" href="termsandconditions.html">Terms</a>
    </nav>
    <div class="nav-actions">
      <a href="index.html" class="browse-nav-btn">
        Browse Products
      </a>
      <button class="theme-btn" id="themeBtn" title="Toggle theme">☽</button>
      <button class="sub-mobile-btn" id="subMobileBtn" aria-label="Open navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="sub-nav-drawer" id="subNavDrawer">
    <div class="sub-nav-overlay" onclick="closeSubNav()"></div>
    <div class="sub-nav-panel">
      <div class="sub-nav-header">
        <span class="sub-nav-title">Navigate</span>
        <button class="sub-nav-close" onclick="closeSubNav()">✕</button>
      </div>
      <div class="sub-nav-links">
        <a class="sub-nav-link" href="index.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          Home
        </a>
        <a class="sub-nav-link" href="about.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          About
        </a>
        <a class="sub-nav-link" href="privacypolicy.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Privacy Policy
        </a>
        <a class="sub-nav-link" href="termsandconditions.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Terms &amp; Conditions
        </a>
      </div>
    </div>
  </div>

  <section class="saved-hero">
    <h1>Saved Pins</h1>
    <p>
      Your bookmarked product finds across Shopee, SHEIN, and Amazon.
    </p>
  </section>

  <main class="saved-wrap">

    <div id="savedPinsGrid"></div>

    <div id="emptyState" class="empty-state" style="display:none;">
      <h2>No saved pins yet</h2>

      <p>
        Save products from the homepage to view them here later.
      </p>

      <a href="index.html" class="browse-btn">
        Browse Products
      </a>
    </div>

  </main>

  <script>

    // THEME

    (function() {

      const html = document.documentElement;

      const btn =
        document.getElementById('themeBtn');

      const saved =
        localStorage.getItem('pp-theme') || 'light';

      html.setAttribute('data-theme', saved);

      btn.textContent =
        saved === 'dark' ? '☀' : '☽';

      btn.addEventListener('click', () => {

        const next =
          html.getAttribute('data-theme') === 'light'
            ? 'dark'
            : 'light';

        html.setAttribute('data-theme', next);

        localStorage.setItem('pp-theme', next);

        btn.textContent =
          next === 'dark' ? '☀' : '☽';

      });

    })();

    // SAVED PINS

    function getSavedPins() {
      return JSON.parse(localStorage.getItem('savedPins')) || [];
    }

    function setSavedPins(pins) {
      localStorage.setItem('savedPins', JSON.stringify(pins));
    }

    function renderSavedPins() {

      const grid =
        document.getElementById('savedPinsGrid');

      const empty =
        document.getElementById('emptyState');

      const pins =
        getSavedPins();

      grid.innerHTML = '';

      if (!pins.length) {

        empty.style.display = 'flex';
        return;
      }

      empty.style.display = 'none';

      pins.forEach(pin => {

        const card = document.createElement('a');

        card.className = 'card';

        card.href = pin.href;

        card.target = '_blank';

        card.rel = 'noopener nofollow';

        card.innerHTML = `
          <img
            class="card-img"
            src="${pin.image}"
            alt="${pin.title}"
            loading="lazy"
          />

          <div class="card-body">

            <div class="meta-row">

              <span class="meta-tag">
                ${pin.platform || 'Saved'}
              </span>

              <span class="meta-tag">
                ${pin.category || 'Products'}
              </span>

            </div>

            <h3>${pin.title}</h3>

            <div class="card-footer">

              <span class="card-cta">
                Check Price →
              </span>

              <button
                class="save-btn"
                aria-label="Remove saved product"
                type="button"
              >

                <svg
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>

              </button>

            </div>

          </div>
        `;

        const removeBtn =
          card.querySelector('.save-btn');

        removeBtn.addEventListener('click', (e) => {

          e.preventDefault();
          e.stopPropagation();

          const updated =
            getSavedPins().filter(
              item => item.title !== pin.title
            );

          setSavedPins(updated);

          card.remove();

          if (!updated.length) {
            empty.style.display = 'flex';
          }

        });

        grid.appendChild(card);

      });

    }

    renderSavedPins();

    function closeSubNav() { document.getElementById('subNavDrawer').classList.remove('open'); document.body.classList.remove('nav-open'); }
    document.getElementById('subMobileBtn').addEventListener('click', function() { document.getElementById('subNavDrawer').classList.add('open'); document.body.classList.add('nav-open'); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeSubNav(); });

  </script>

</body>
